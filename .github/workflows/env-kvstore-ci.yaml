---
name: env-kvstore CI

on:
  pull_request:
    paths:
      - tools/env-kvstore/**
      - .github/workflows/env-kvstore-ci.yaml
      - .github/workflows/reusable-ci.yaml

jobs:
  release:
    uses: ./.github/workflows/reusable-ci.yaml
    permissions:
      contents: write
      packages: write
    with:
      tool-directory: ./tools/env-kvstore
